<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Código Florestal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Calculadora do Código Florestal</h1>
        <p>Descubra quantos hectares da sua propriedade devem ser preservados como Reserva Legal e APP.</p>
    </header>

    <main>
        <section class="calculator">
            <form id="propertyForm">
                <label for="area">Tamanho da propriedade (hectares):</label>
                <input type="number" id="area" min="0" required>

                <label for="currentPreserved">Área já preservada (hectares):</label>
                <input type="number" id="currentPreserved" min="0" value="0" required>

                <button type="submit">Calcular</button>
            </form>

            <div id="result" class="hidden">
                <h2>Resultado</h2>
                <p id="reserveResult"></p>
                <p id="appResult"></p>
                <p id="advice"></p>
            </div>

            <div class="visualization hidden" id="visualization">
                <div class="total-area">
                    <div class="reserve-legal" id="visualReserve"></div>
                    <div class="app-area" id="visualApp"></div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>Agro forte, futuro sustentável: equilíbrio entre produção e meio ambiente</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
